version: 3.2
author: Ferraz
patch: "12.0.1"
spec: 104
name: Guardian Master
description: |
  Master Guardian Druid Rotation for Mythic+.
  Supports both Elunes Chosen and Druid of the Claw hero talents.
  Includes Wowhead (Aggressive DPS) and Alternative / Method.gg (Balanced) rotation styles.

entry: main

config:

  # HERO TALENT TREE
  hero_tree:
    label: "Hero Talent Tree"
    type: dropdown
    options:
      - label: "Elune's Chosen"
        value: 1
      - label: "Druid of the Claw"
        value: 2
    default: 1

  # ROTATION STYLE
  rotation_source:
    label: "Rotation Style"
    type: dropdown
    options:
      - label: "Wowhead (Aggressive DPS)"
        value: 1
      - label: "Alternative / Method (Balanced)"
        value: 2
    default: 2

  # CONFIG
  allow_pull_with_mo:
    label: "Pull with Moonfire"
    type: checkbox
    default: true
  survival_instincts_threshold:
    label: Survival Instincts %
    type: slider
    min: 10
    max: 70
    default: 50
  frenzied_regen_threshold:
    label: Frenzied Regeneration %
    type: slider
    min: 30
    max: 80
    default: 65
  barkskin_threshold:
    label: Barkskin %
    type: slider
    min: 30
    max: 90
    default: 65
  ironfur_stacks_min:
    label: "Min Ironfur Stacks to maintain"
    type: slider
    min: 1
    max: 7
    default: 3
  ironfur_stacks_max:
    label: "Max Ironfur Stacks (heavy damage)"
    type: slider
    min: 3
    max: 10
    default: 5
  ironfur_rage_threshold:
    label: "Min Rage for Ironfur"
    type: slider
    min: 30
    max: 80
    default: 40
  rage_cap_threshold:
    label: "Rage Cap Threshold (dump)"
    type: slider
    min: 60
    max: 100
    default: 80

  # MAJOR COOLDOWNS
  incarnation_enemies:
    label: "Min enemies for Incarnation"
    type: slider
    min: 1
    max: 10
    default: 3
  rage_of_sleeper_threshold:
    label: "HP% for Rage of the Sleeper (Elune)"
    type: slider
    min: 30
    max: 90
    default: 70

  # ROTATION
  thrash_stacks_target:
    label: "Thrash Stacks to maintain"
    type: slider
    min: 1
    max: 5
    default: 3
  raze_targets:
    label: "Min targets for Raze (instead of Maul - Elune)"
    type: slider
    min: 2
    max: 5
    default: 2

  # INTERRUPTS
  use_skull_bash:
    label: "Auto Interrupt"
    type: checkbox
    default: true
  skull_bash_delay:
    label: "Interrupt Delay (ms)"
    type: slider
    min: 0
    max: 2000
    default: 250

  # MOVEMENT
  stampeding_roar_usage:
    label: "Stampeding Roar Usage"
    type: dropdown
    options:
      - label: "Disabled"
        value: 0
      - label: "Only in combat"
        value: 1
      - label: "Only out of combat"
        value: 2
      - label: "Always when moving"
        value: 3
    default: 2
  stampeding_roar_movement_time:
    label: "Roar after moving (seconds)"
    type: slider
    min: 0
    max: 4
    default: 2

  # TRINKETS
  trinket_usage:
    label: "Trinket Usage"
    type: dropdown
    options:
      - label: "On Cooldown"
        value: 1
      - label: "With Incarnation"
        value: 2
      - label: "When taking damage"
        value: 3
      - label: "Manual Only"
        value: 0
    default: 1

variables:
  # FORM AND RESOURCES
  in_bear_form: buff.bear_form.up
  rage: player.rage
  rage_deficit: player.rage.max-player.rage
  rage_overcap: var.rage>=config.rage_cap_threshold
  rage_for_harnessed: var.rage>=80

  # DEFENSIVE BUFFS
  ironfur_stacks: buff.ironfur.stack
  need_ironfur: var.ironfur_stacks<config.ironfur_stacks_min&var.rage>=config.ironfur_rage_threshold
  heavy_damage: health.pct<70&var.ironfur_stacks<config.ironfur_stacks_max
  dangerous_situation: health.pct<50&!buff.survival_instincts.up
  emergency_situation: health.pct<30
  barkskin_up: buff.barkskin.up
  survival_up: buff.survival_instincts.up
  any_major_defensive: var.barkskin_up|var.survival_up|buff.rage_of_the_sleeper.up
  after_avenger_up: buff.after_avenger.up|buff.after_the_wildfire.up

  # OFFENSIVE PROCS
  galactic_guardian_up: buff.galactic_guardian.up
  tooth_and_claw_up: buff.tooth_and_claw.up
  gore_up: buff.gore.up
  harnessed_rage: talent.harnessed_rage
  mangle_charges: cooldown.mangle.charges

  # DOT TRACKING
  thrash_stacks: debuff.thrash.stack
  thrash_target_stacks: config.rotation_source=1?5:config.thrash_stacks_target
  thrash_needs_refresh: debuff.thrash.remains<4.5|debuff.thrash.stack<var.thrash_target_stacks
  moonfire_needs_refresh: debuff.moonfire.remains<4.8

  # COOLDOWN STATES
  lunar_beam_active: buff.lunar_beam.up
  lunar_beam_soon: cooldown.lunar_beam.remains<15
  lunar_beam_ready: cooldown.lunar_beam.ready
  incarnation_active: buff.incarnation_guardian_of_ursoc.up|buff.berserk.up
  combat_start: player.combat&player.combat.time<3
  
  # ELUNE'S CHOSEN SYNERGY
  use_lunar_beam: var.lunar_beam_ready&(active_enemies>=2|health.pct<70|target.boss)

  # TARGETING
  use_raze: config.hero_tree=1&active_enemies>=config.raze_targets
  can_interrupt: target.casting&!target.casting.interruptible=false

  # MOVEMENT
  use_stampeding_roar: moving.time>=config.stampeding_roar_movement_time&buff.stampeding_roar.down&((config.stampeding_roar_usage=1&player.combat)|(config.stampeding_roar_usage=2&!player.combat)|(config.stampeding_roar_usage=3))

lists:

  spell_queue:
    - queue_spell

  buff_mark_of_the_wild:
    - mark_of_the_wild,if=group.count(cycle.buff.mark_of_the_wild.down.any&cycle.range>0&cycle.range<=40)>0

  sanity_checks:
    - return,if=player.dead
    - return,if=mounted
    - return,if=!state.rotation
    - return,if=state.blocked_inputs
    - return,if=player.cc
    - return,if=player.loot_nearby

  defensives:
    - survival_instincts,if=var.emergency_situation&!var.survival_up
    - rage_of_the_sleeper,if=config.hero_tree=1&var.emergency_situation&!var.survival_up
    - frenzied_regeneration,if=var.emergency_situation&var.rage>=10
    - barkskin,if=var.emergency_situation&!var.survival_up
    - survival_instincts,if=var.dangerous_situation&!var.barkskin_up
    - frenzied_regeneration,if=var.dangerous_situation&var.rage>=20
    - ironfur,if=var.dangerous_situation&var.rage>=40
    - survival_instincts,if=health.pct<config.survival_instincts_threshold&cooldown.frenzied_regeneration.remains>2&!var.any_major_defensive
    - frenzied_regeneration,if=health.pct<config.frenzied_regen_threshold
    - barkskin,if=health.pct<config.barkskin_threshold&!var.survival_up
    - ironfur,if=var.after_avenger_up&var.ironfur_stacks<config.ironfur_stacks_max
    - ironfur,if=var.heavy_damage&var.rage>=40
    - ironfur,if=var.incarnation_active&var.ironfur_stacks<config.ironfur_stacks_max&var.rage>=45
      
  cooldowns:
    - lunar_beam,if=config.hero_tree=1&var.use_lunar_beam
    - incarnation_guardian_of_ursoc,if=active_enemies>=config.incarnation_enemies|(target.boss&target.time_to_die>20)
    - rage_of_the_sleeper,if=config.hero_tree=1&(health.pct<config.rage_of_sleeper_threshold|active_enemies>=4|(var.incarnation_active&active_enemies>=3))
    - berserk_ravage,if=talent.berserk_ravage&(active_enemies>=3|target.boss)
    - berserk_ravage,if=config.hero_tree=1&talent.berserk&(active_enemies>=3|target.boss)
    - heart_of_the_wild,if=config.hero_tree=1&var.in_bear_form&active_enemies>=4
  
  interrupts:
    - skull_bash,if=config.use_skull_bash&var.can_interrupt,delay=config.skull_bash_delay
    - soothe,if=target.purgeable.enrage
    - incapacitating_roar,if=active_enemies>=3&talent.incapacitating_roar

  dispel:
    - remove_corruption,cycle=members,if=cycle.dispelable.list&cycle.range>0&cycle.range<=40

  taunt:
    - growl,target=mouseover,if=target.threat<3&target.range<=30&target.alive&target.enemy
    - growl,if=target.threat<3&target.range<=30
  
  rage_management:
    - ironfur,if=var.need_ironfur
    - ironfur,if=var.ironfur_stacks<config.ironfur_stacks_max&var.rage>=60&buff.ironfur.remains<3
    - ravage,if=config.hero_tree=2&buff.ravage.up
    - maul,if=var.tooth_and_claw_up&var.rage>=35&!var.use_raze
    - raze,if=var.use_raze&var.rage_for_harnessed
    - raze,if=var.use_raze&var.rage_overcap
    - maul,if=var.incarnation_active&var.rage>=50&!var.use_raze
    - maul,if=!var.use_raze&var.rage_overcap
  
  moonfire_spread:
    - moonfire,if=var.combat_start&debuff.moonfire.down&range<=40
    - moonfire,if=var.incarnation_active&debuff.moonfire.down&range<=40
    - moonfire,if=var.galactic_guardian_up
    - moonfire,if=config.hero_tree=1&var.lunar_beam_soon&var.moonfire_needs_refresh
    - moonfire,if=debuff.moonfire.down
    - moonfire,if=var.moonfire_needs_refresh
    - moonfire,target=mouseover,if=debuff.moonfire.down&range<=40&target.alive&target.enemy

  # ----------------------------------------------------------
  #  ELUNE'S CHOSEN ROTATIONS
  # ----------------------------------------------------------
  
  rotation_st_elune_wowhead:
    - moonfire,if=var.moonfire_needs_refresh
    - thrash,if=debuff.thrash.stack<5
    - barkskin
    - maul,if=var.rage>=40&var.ironfur_stacks>=1
    - mangle
    - thrash
    - moonfire,if=var.galactic_guardian_up
    - incarnation_guardian_of_ursoc
    - swipe

  rotation_st_elune_alt:
    - mangle,if=var.gore_up
    - mangle,if=var.harnessed_rage&var.mangle_charges>=2
    - mangle
    - thrash
    - moonfire,if=var.galactic_guardian_up
    - moonfire,if=var.lunar_beam_soon&var.moonfire_needs_refresh
    - moonfire,if=var.moonfire_needs_refresh
    - raze,if=active_enemies=1&var.rage>=90
    - raze,if=var.use_raze&var.rage>=config.rage_cap_threshold
    - maul,if=var.rage>=config.rage_cap_threshold&var.tooth_and_claw_up
    - maul,if=var.rage>=config.rage_cap_threshold
    - swipe
  
  rotation_aoe_elune_wowhead:
    - thrash,if=debuff.thrash.stack<5
    - barkskin
    - raze,if=var.rage>=40&var.ironfur_stacks>=1
    - thrash
    - mangle
    - incarnation_guardian_of_ursoc
    - moonfire
    - swipe

  rotation_aoe_elune_alt:
    - thrash,if=var.thrash_needs_refresh
    - mangle,if=var.gore_up
    - mangle,if=var.harnessed_rage&var.mangle_charges>=2
    - thrash
    - mangle
    - call_action_list,name=moonfire_spread
    - raze,if=var.lunar_beam_active&var.rage>=30
    - raze,if=var.rage_for_harnessed
    - raze,if=var.rage>=config.rage_cap_threshold
    - maul,if=var.tooth_and_claw_up&var.rage>=60
    - raze,if=var.rage>=40
    - swipe

  # ----------------------------------------------------------
  #  DRUID OF THE CLAW ROTATIONS
  # ----------------------------------------------------------

  rotation_st_claw_wowhead:
    - ravage,if=buff.ravage.up
    - moonfire,if=debuff.moonfire.remains<4.8
    - thrash,if=debuff.thrash.stack<config.thrash_stacks_target
    - mangle,if=buff.gore.up
    - mangle
    - maul,if=player.rage>=40&buff.ironfur.stack>=1&buff.tooth_and_claw.up
    - maul,if=player.rage>=config.rage_cap_threshold&buff.ironfur.stack>=1
    - thrash
    - moonfire,if=buff.galactic_guardian.up
    - swipe

  rotation_aoe_claw_wowhead:
    - ravage,if=buff.ravage.up
    - thrash,if=debuff.thrash.stack<config.thrash_stacks_target
    - maul,if=player.rage>=40&buff.ironfur.stack>=1
    - thrash
    - mangle,if=buff.gore.up
    - mangle
    - call_action_list,name=moonfire_spread
    - swipe

  rotation_st_claw_method:
    - ravage,if=buff.ravage.up
    - mangle,if=buff.gore.up
    - mangle,if=cooldown.mangle.charges>=2
    - mangle
    - thrash,if=debuff.thrash.remains<4.5|debuff.thrash.stack<config.thrash_stacks_target
    - moonfire,if=buff.galactic_guardian.up
    - moonfire,if=debuff.moonfire.remains<4.8
    - maul,if=player.rage>=config.rage_cap_threshold&buff.tooth_and_claw.up
    - maul,if=player.rage>=config.rage_cap_threshold
    - thrash
    - swipe

  rotation_aoe_claw_method:
    - ravage,if=buff.ravage.up
    - thrash,if=debuff.thrash.remains<4.5|debuff.thrash.stack<config.thrash_stacks_target
    - mangle,if=buff.gore.up
    - mangle,if=cooldown.mangle.charges>=2
    - thrash
    - mangle
    - call_action_list,name=moonfire_spread
    - maul,if=player.rage>=config.rage_cap_threshold
    - maul,if=player.rage>=40&buff.tooth_and_claw.up
    - maul,if=player.rage>=40
    - swipe

  # ----------------------------------------------------------
  #  SHARED / MISC
  # ----------------------------------------------------------

  trinkets:
    - trinket_1,if=trinket_1.ready&config.trinket_usage!=0&((config.trinket_usage=1)|(config.trinket_usage=2&var.incarnation_active)|(config.trinket_usage=3&health.pct<70))
    - trinket_2,if=trinket_2.ready&config.trinket_usage!=0&((config.trinket_usage=1)|(config.trinket_usage=2&var.incarnation_active)|(config.trinket_usage=3&health.pct<70))

  movement:
    - stampeding_roar,if=var.use_stampeding_roar&config.stampeding_roar_usage!=0
  
  # ----------------------------------------------------------
  #  MAIN ENTRY POINT
  # ----------------------------------------------------------
  
  main:
    - call_action_list,name=sanity_checks
    - call_action_list,name=spell_queue
    - call_action_list,name=buff_mark_of_the_wild
    - heart_of_the_wild,if=config.hero_tree=2&!var.in_bear_form&!buff.cat_form.up&player.combat
    - bear_form,if=!var.in_bear_form&player.combat&!mounted.flying&!mounted.ground
    - moonfire,if=config.allow_pull_with_mo&!player.combat&target.enemy&target.alive&debuff.moonfire.down
    - return,if=!player.combat&active_enemies=0
    - return,if=player.channeling
    
    # Targeting & utility
    - call_action_list,name=auto_target
    - call_action_list,name=auto_heal    
    - call_action_list,name=taunt
    - call_action_list,name=interrupts
    - call_action_list,name=dispel
    
    # Survival & cooldowns
    - call_action_list,name=defensives,if=var.in_bear_form
    - call_action_list,name=cooldowns,if=var.in_bear_form
    - call_action_list,name=rage_management,if=var.in_bear_form
    
    # Movement & Utils
    - call_action_list,name=movement,if=player.moving
    - call_action_list,name=trinkets
    
    # Elune's Chosen Rotations
    - call_action_list,name=rotation_aoe_elune_wowhead,if=config.hero_tree=1&config.rotation_source=1&active_enemies>=3&var.in_bear_form
    - call_action_list,name=rotation_st_elune_wowhead,if=config.hero_tree=1&config.rotation_source=1&var.in_bear_form
    - call_action_list,name=rotation_aoe_elune_alt,if=config.hero_tree=1&config.rotation_source=2&active_enemies>=3&var.in_bear_form
    - call_action_list,name=rotation_st_elune_alt,if=config.hero_tree=1&config.rotation_source=2&var.in_bear_form

    # Druid of the Claw Rotations
    - call_action_list,name=rotation_aoe_claw_wowhead,if=config.hero_tree=2&config.rotation_source=1&active_enemies>=3&var.in_bear_form
    - call_action_list,name=rotation_st_claw_wowhead,if=config.hero_tree=2&config.rotation_source=1&var.in_bear_form
    - call_action_list,name=rotation_aoe_claw_method,if=config.hero_tree=2&config.rotation_source=2&active_enemies>=3&var.in_bear_form
    - call_action_list,name=rotation_st_claw_method,if=config.hero_tree=2&config.rotation_source=2&var.in_bear_form